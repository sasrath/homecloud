# Nginx reverse proxy for Nextcloud — runs on your ORACLE VPS
# Place at /etc/nginx/sites-available/nextcloud
# Replace files.yourdomain.com with your actual domain
# After placing this file, run:
#   sudo ln -s /etc/nginx/sites-available/nextcloud /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl restart nginx
#   sudo certbot --nginx -d files.yourdomain.com

server {
    listen 80;
    server_name files.yourdomain.com;

    client_max_body_size 10G;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
