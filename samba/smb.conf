# Samba configuration for homecloud
# Add this to the bottom of /etc/samba/smb.conf
# Replace 'your-username' with your actual Linux username

[NAS]
   path = /srv/nas
   browseable = yes
   read only = no
   valid users = your-username
   create mask = 0644
   directory mask = 0755
   force user = www-data
   force group = www-data

[Photos]
   path = /srv/nas/photos
   browseable = yes
   read only = no
   valid users = your-username
   create mask = 0644
   directory mask = 0755
   force user = www-data
   force group = www-data

[Videos]
   path = /srv/nas/videos
   browseable = yes
   read only = no
   valid users = your-username
   create mask = 0644
   directory mask = 0755
   force user = www-data
   force group = www-data
